  - curl
  - wget
  - gnupg
  - lsb-release
  - git
  - git-lfs
  - vim
  - tmux
  - tree
  - jq
  - htop
  - unzip
  - zip
  - build-essential
  - locales
  - zsh
  - software-properties-common
