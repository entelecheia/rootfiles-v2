name: Release

# Triggered directly on version-tag push rather than via workflow_run of the
# Test workflow. Background: GitHub's workflow_run event populates
# head_branch from the source branch of the commit, which for a tag push
# (where the tagged commit already lives on main) resolves to "main" — so
# the previous `startsWith(head_branch, 'v')` guard silently skipped every
# release after v0.7.0. Direct tag trigger is unambiguous: the workflow
# fires exactly when a v* tag is pushed, and goreleaser's own build + lint
# acts as a last-line sanity check.
#
# The Test workflow still runs in parallel on the same tag push (test.yaml
# has `tags: ["v*"]` in its push trigger) so CI visibility is retained;
# failing tests will show up as a separate red check alongside the release.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
